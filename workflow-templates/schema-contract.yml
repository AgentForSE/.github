name: Traceability Schema Contract

# 校验业务仓对组织公共 traceability Artifact / TraceLink schema 的兼容性。
# 将本仓库的 docs/architecture/platform-modules/traceability.md 中的 schema 定义
# 视为契约源；业务仓引用的字段不得超出已发布 schema。

on:
  push:
    branches: [main]
  pull_request:

jobs:
  schema-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4

      - name: Checkout AgentForSE/.github (schema source)
        uses: actions/checkout@v4
        with:
          repository: AgentForSE/.github
          path: .agentforse-schema

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validators
        run: pip install jsonschema pyyaml

      - name: Validate Artifact / Link usage against contract
        run: |
          # TODO: 业务仓需提供 ./contracts/traceability_usage.json 列出本仓使用的
          # Artifact 类型与 TraceLink relation；脚本会校验它们是否被
          # AgentForSE/.github 的 traceability.md 注册。
          if [ ! -f contracts/traceability_usage.json ]; then
            echo "::warning::contracts/traceability_usage.json 缺失，跳过校验"
            exit 0
          fi
          python - <<'PY'
          import json, re, pathlib, sys
          spec = pathlib.Path(".agentforse-schema/docs/architecture/platform-modules/traceability.md").read_text(encoding="utf-8")
          allowed_types = set(re.findall(r"`([a-z_]+)`", spec))  # 粗粒度提取
          usage = json.loads(pathlib.Path("contracts/traceability_usage.json").read_text())
          missing = [t for t in usage.get("artifact_types", []) if t not in allowed_types]
          if missing:
              print("以下 Artifact 类型未在公共 traceability 契约中注册：", missing)
              sys.exit(1)
          print("Schema 契约校验通过")
          PY
